<!DOCTYPE html>
<html lang="it">

<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelioH&#x2082; &ndash; File Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="j/keynote.css">
  <link rel="icon" type="image/x-icon" href="s/favicon.ico">
  <script src="j/auth.js"></script>
  <script>HelioAuth.requireAuth();</script>
</head>

<body>

  <div class="hero">
    <a href="/t/" class="back-link">← Back to Tools</a>
    <h1>File Explorer</h1>
    <p>All files in this folder, instantly searchable.</p>
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input id="searchInput" type="search" placeholder="Search files…" autocomplete="off" autofocus />
    </div>
    <div class="chips" id="chips"></div>
    <div class="notice" id="notice">
      &#9888;&nbsp;<strong>Could not load files.json.</strong>
      Make sure <code>files.json</code> is in the same folder as <code>index.html</code>.
    </div>
  </div>

  <div class="stats">
    <div class="stats-count" id="statsCount">&nbsp;</div>
    <select class="sort-select" id="sortSelect">
      <option value="name">Name A&ndash;Z</option>
      <option value="name-desc">Name Z&ndash;A</option>
      <option value="ext">Group by type</option>
    </select>
  </div>

  <div id="output"></div>

  <script src="j/keynote.js"></script>
  
</body>

</html>
